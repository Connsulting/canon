name: release

on:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          tag_version="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
          file_version="$(tr -d '\r\n' < cmd/canon/VERSION | tr '[:upper:]' '[:lower:]')"

          if [ "${tag_version}" != "${file_version}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match VERSION ${file_version}"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Run tests
        run: go test ./...

  vet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Run vet
        run: go vet ./...

  build:
    needs: [version, test, vet]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Build executable
        id: build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          asset_name="canon_${VERSION}_${GOOS}_${GOARCH}${EXT}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${asset_name}" ./cmd/canon

          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.asset_name }}
          path: dist/${{ steps.build.outputs.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release assets
        shell: bash
        run: ls -lh dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
